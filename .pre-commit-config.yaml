repos:
  # Prek builtin hooks (fast Rust implementations)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: check-xml
      - id: mixed-line-ending
      - id: check-symlinks
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-executables-have-shebangs
      # Additional hooks not in prek builtins yet
      - id: check-case-conflict
      - id: check-shebang-scripts-are-executable
      - id: destroyed-symlinks

  # All formatting (nix/markdown/shell) runs through treefmt; its config lives
  # in flake.nix. treefmt comes from the devShell, hence language: system.
  - repo: local
    hooks:
      - id: treefmt
        name: treefmt
        entry: treefmt --fail-on-change
        language: system
        pass_filenames: false

  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.12
    hooks:
      - id: shellcheck
